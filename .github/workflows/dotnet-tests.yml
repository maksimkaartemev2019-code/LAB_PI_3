name: dotnet-tests

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore tests/TodoApp.Tests/TodoApp.Tests.csproj

      - name: Build
        run: dotnet build tests/TodoApp.Tests/TodoApp.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/TodoApp.Tests/TodoApp.Tests.csproj --configuration Release --no-build --verbosity normal
